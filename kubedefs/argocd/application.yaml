apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vprofile
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/jillaraju/kubernetes-project-01.git
    targetRevision: main
    path: myapp

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
